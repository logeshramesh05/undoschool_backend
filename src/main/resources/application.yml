server:
  port: 10000

spring:
  datasource:
    url: jdbc:mysql://${DB_HOST}:${DB_PORT}/${DB_NAME}?sslMode=VERIFY_IDENTITY&enabledTLSProtocols=TLSv1.2
    username: ${DB_USER}
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false

springdoc:
  api-docs:
    path: /api-docs

  swagger-ui:
    path: /swagger-ui.html

    
    supported-submit-methods: []     
   
    urls-primary-name: "🌐 Production"

    
    operations-sorter: method
    tags-sorter: alpha

    doc-expansion: list

   
    display-operation-id: false        
    display-request-duration: true    
    show-extensions: false
    show-common-extensions: false
    deep-linking: true                 

    filter: true                      
    syntaxHighlight:
      activated: true
      theme: monokai                  
